name: Sync Strava Data

on:
  schedule:
    - cron: '0 0 * * *' # Berjalan otomatis setiap tengah malam
  workflow_dispatch:
    inputs:
      auth_code:
        description: 'Masukkan Code dari URL Strava (Hanya untuk inisialisasi awal)'
        required: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Environment
        run: mkdir -p data

      - name: Exchange Auth Code
        if: "${{ github.event.inputs.auth_code != '' }}"
        run: |
          echo "Menukarkan Code menjadi Refresh Token..."
          curl -s -X POST https://www.strava.com/api/v3/oauth/token \
            -d client_id=${{ secrets.STRAVA_CLIENT_ID }} \
            -d client_secret=${{ secrets.STRAVA_CLIENT_SECRET }} \
            -d code=${{ github.event.inputs.auth_code }} \
            -d grant_type=authorization_code > new_token.json
          
          if jq -e '.refresh_token' new_token.json > /dev/null; then
            echo "✅ Berhasil! SALIN REFRESH TOKEN INI KE GITHUB SECRETS:"
            jq -r .refresh_token new_token.json
          else
            echo "❌ Gagal menukarkan code. Respon API:"
            cat new_token.json
            exit 1
          fi

      - name: Fetch & Merge Activities
        run: |
          # 1. Ambil Access Token baru
          curl -s -X POST https://www.strava.com/api/v3/oauth/token \
            -d client_id=${{ secrets.STRAVA_CLIENT_ID }} \
            -d client_secret=${{ secrets.STRAVA_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.STRAVA_REFRESH_TOKEN }} \
            -d grant_type=refresh_token > token_output.json
            
          ACCESS_TOKEN=$(jq -r .access_token token_output.json)
          
          if [ "$ACCESS_TOKEN" == "null" ]; then
            echo "❌ Gagal mendapatkan Access Token. Cek REFRESH_TOKEN di Secrets."
            cat token_output.json
            exit 1
          fi
          
          # 2. Ambil 30 aktivitas terbaru
          curl -s -X GET "https://www.strava.com/api/v3/athlete/activities?per_page=30" \
            -H "Authorization: Bearer $ACCESS_TOKEN" > data/latest_fetch.json

          # Validasi apakah respon adalah Array (mencegah error jq 'add')
          if ! jq -e 'type == "array"' data/latest_fetch.json > /dev/null; then
            echo "❌ Respon API bukan array! Terjadi error pada Strava API:"
            cat data/latest_fetch.json
            exit 1
          fi

          # 3. Logika Penggabungan (Incremental)
          if [ ! -f data/activities.json ]; then echo "[]" > data/activities.json; fi

          jq -s 'add | unique_by(.id) | sort_by(.start_date) | reverse' \
            data/activities.json data/latest_fetch.json > data/temp_combined.json
          
          mv data/temp_combined.json data/activities.json
          
          # Bersihkan file sensitif
          rm -f token_output.json data/latest_fetch.json new_token.json

      - name: Commit and Push
        run: |
          git config --global user.name 'Dashstrav Bot'
          git config --global user.email 'bot@dashstrav.local'
          git add data/activities.json
          
          # Hanya commit jika ada data baru
          if ! git diff --cached --quiet; then
            git commit -m "⚡ Sync Strava: $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "Sama dengan data lokal, tidak ada yang di-update."
          fi
